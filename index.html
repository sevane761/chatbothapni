<!DOCTYPE html>
<html>
<head>
  <title>Support HAPNI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    #bp-webchat { width: 100%; height: 100vh; border: none; display: block; }
  </style>
</head>
<body>
<script>
  const params = new URLSearchParams(window.location.search);
  const sam = params.get('sam') || '';
  const cabinet = params.get('cabinet') || '';
  const iframeUrl = `https://cdn.botpress.cloud/webchat/v3.6/shareable.html?configUrl=https://files.bpcontent.cloud/2026/02/09/20/20260209204236-VVRH1HE9.json&sam=${sam}&cabinet=${cabinet}`;
  document.write(`<iframe id="bp-webchat" src="${iframeUrl}"></iframe>`);
</script>
</body>
</html>
